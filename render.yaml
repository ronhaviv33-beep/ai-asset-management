services:
  # ── Combined app (FastAPI serves API + React frontend from same origin) ─────
  # No CORS or VITE_API_BASE configuration needed — everything is same-origin.
  - type: web
    name: ai-asset-app
    runtime: python
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GUARD_MODE
        value: observe
      - key: GATEWAY_LLM_TIMEOUT_SECS
        value: "30"
      - key: GATEWAY_ENFORCE_TIMEOUT_SECS
        value: "5"
      # Set these in the Render dashboard — never commit real keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOCAL_LLM_URL
        sync: false
      # Fernet key for encrypting per-org provider credentials (BYOK).
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Set in Render dashboard (sync:false). Never commit the real value.
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
