services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: ai-asset-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GUARD_MODE
        value: observe
      - key: GATEWAY_LLM_TIMEOUT_SECS
        value: "30"
      - key: GATEWAY_ENFORCE_TIMEOUT_SECS
        value: "5"
      # Set these in the Render dashboard — never commit real keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOCAL_LLM_URL
        sync: false
      # Fernet key for encrypting per-org provider credentials (BYOK).
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Set in Render dashboard (sync:false). Never commit the real value.
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # Frontend origin for CORS — set to your actual frontend URL after first deploy
      - key: FRONTEND_ORIGIN
        sync: false

  # ── Frontend (Vite / React static site) ───────────────────────────────────
  - type: web
    name: ai-asset-frontend
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    envVars:
      # VITE_API_URL is auto-derived from the backend service hostname at build time.
      # vite.config.js converts it to https://<host> and bakes it into the bundle.
      # You can override with VITE_API_BASE (full URL) set manually in the dashboard.
      - key: VITE_API_URL
        fromService:
          name: ai-asset-backend
          type: web
          property: host
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
