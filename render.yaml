services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: aifinops-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GUARD_MODE
        value: observe
      - key: GATEWAY_LLM_TIMEOUT_SECS
        value: "30"
      - key: GATEWAY_ENFORCE_TIMEOUT_SECS
        value: "5"
      # Set these in the Render dashboard — never commit real keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOCAL_LLM_URL
        sync: false
      # Frontend origin for CORS — set to your actual frontend URL after first deploy
      - key: FRONTEND_ORIGIN
        sync: false

  # ── Frontend (Vite / React static site) ───────────────────────────────────
  - type: web
    name: aifinops-frontend
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    envVars:
      # Render injects the backend's host here at build time (e.g. aifinops-backend.onrender.com).
      # The frontend normalizes a bare host to https:// — see dashboard/src/api.js resolveBase().
      - key: VITE_API_BASE
        fromService:
          name: aifinops-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
